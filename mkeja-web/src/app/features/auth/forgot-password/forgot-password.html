<div class="auth-page">
  <header class="auth-brand">
    <div class="auth-brand-badge">
      <img src="/logo-mkeja.png" alt="Mkeja" class="auth-brand-logo">
    </div>
    <h1>Welcome back</h1>
    <p>Sign in to continue to your dashboard</p>
  </header>

  <div class="auth-card">
    <div class="auth-brand" style="margin-bottom: 24px;">
      <div class="auth-brand-badge">
        <span class="material-icons">lock_reset</span>
      </div>
      <h2>Forgot PIN?</h2>
      <p>Enter your M-Pesa number to reset your PIN</p>
    </div>

    <div class="auth-form-group">
      <label for="phone">M-Pesa Number</label>

      <div class="auth-input-row">
        <span class="auth-input-prefix">+254</span>

        <input
          id="phone"
          type="tel"
          [(ngModel)]="phone"
          (ngModelChange)="formatPhone()"
          placeholder="712345678"
          maxlength="9">
      </div>

      <small class="auth-hint">
        Enter the phone number linked to your account.
      </small>
    </div>

    <button
      class="auth-btn-primary"
      [disabled]="loading"
      (click)="onSubmit()">

      @if (loading) {
        <span class="auth-spinner"></span>
        Sending OTP...
      } @else {
        Send Reset Code
      }
    </button>

    <div class="auth-footer-link">
      <a routerLink="/auth/login">
        Back to Login
      </a>
    </div>

    <div class="auth-security-note">
      <span class="material-icons" style="font-size:16px;">security</span>
      <span>
        We'll send a verification code to your registered phone number.
      </span>
    </div>
  </div>

  @if (showToast) {
    <app-toast
      [type]="toastType"
      [message]="toastMessage"
      (close)="closeToast()">
    </app-toast>
  }
</div>
