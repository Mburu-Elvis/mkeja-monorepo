<div class="payments-history platform-page">

  <div class="filters">
    <div class="filter-tabs">
      <button class="filter-tab" [class.active]="filterType === 'all'" (click)="filterType = 'all'; onFilterChange()">
        All
      </button>
      <button class="filter-tab" [class.active]="filterType === 'CREDIT'" (click)="filterType = 'CREDIT'; onFilterChange()">
        Credits
      </button>
      <button class="filter-tab" [class.active]="filterType === 'DEBIT'" (click)="filterType = 'DEBIT'; onFilterChange()">
        Debits
      </button>
    </div>
    
    <div class="filter-dates">
      <input type="date" [(ngModel)]="startDate" (change)="onFilterChange()" placeholder="From">
      <span>to</span>
      <input type="date" [(ngModel)]="endDate" (change)="onFilterChange()" placeholder="To">
      <button class="clear-btn" (click)="clearFilters()">Clear</button>
    </div>
  </div>
  
  @if (loading) {
    <app-loading-spinner [fullScreen]="true" message="Loading transactions..."></app-loading-spinner>
  } @else {
    <div class="transactions-list">
      @if (filteredTransactions.length === 0) {
        <div class="empty-state app-empty-state">
          <div class="app-empty-icon"><span class="material-icons">receipt_long</span></div>
          <h3 class="app-empty-title">No transactions found</h3>
          <p class="app-empty-text">Your payment history will appear here once you make a transaction.</p>
        </div>
      } @else {
        @for (tx of filteredTransactions; track tx.id) {
          <app-transaction-item [transaction]="tx"></app-transaction-item>
        }
      }
    </div>
  }
</div>
