<!-- sidebar.component.html -->
<aside class="desktop-sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <div class="logo-area" [class.collapsed]="collapsed">
      <img src="/logo-mkeja.png" alt="Mkeja" class="mkeja-logo">
    </div>
    <button class="collapse-btn" (click)="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline *ngIf="!collapsed" points="15 18 9 12 15 6"/>
        <polyline *ngIf="collapsed" points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-item" routerLink="/landlord/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span *ngIf="!collapsed">Dashboard</span>
    </a>

    <a class="sidebar-item" routerLink="/landlord/properties" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
      </svg>
      <span *ngIf="!collapsed">Properties</span>
    </a>

    <a class="sidebar-item" routerLink="/landlord/tenants" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span *ngIf="!collapsed">Tenants</span>
    </a>

    <a class="sidebar-item" routerLink="/landlord/payments" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="1" y="4" width="22" height="16" rx="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      <span *ngIf="!collapsed">Payments</span>
    </a>

    <a class="sidebar-item" routerLink="/landlord/remittances" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M21 12V7H5a2 2 0 010-4h14v4"/>
        <path d="M3 5v14a2 2 0 002 2h16v-5"/>
        <path d="M18 12a2 2 0 000 4h4v-4z"/>
      </svg>
      <span *ngIf="!collapsed">Remittances</span>
    </a>

    <a class="sidebar-item" routerLink="/landlord/support" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span *ngIf="!collapsed">Support</span>
    </a>
  </nav>

  <div class="sidebar-footer" *ngIf="!collapsed">
    <div class="user-mini" routerLink="/landlord/profile">
      <div class="avatar-mini">{{ userInitials }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-unit">{{ userTitle }}</span>
      </div>
    </div>
  </div>
</aside>
