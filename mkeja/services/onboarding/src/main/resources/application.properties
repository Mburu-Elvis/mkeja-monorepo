spring.application.name=onboarding
server.port=8080

# ===== DATABASE CONFIGURATION =====
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mkeja}
spring.datasource.username=${DB_USER:mkeja}
spring.datasource.password=${DB_PASSWORD:mkeja123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===== JPA CONFIGURATION =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== LIQUIBASE =====
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ===== JWT =====
jwt.secret=hWc4utZu4igX2NJxRQF+3ASh6hQPaxGxub3kYr55hscKRUQfj9PKE3gezJJP7GXDF9Zzhd86MxNwRexzruKxwg==
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=mkeja.co.ke

# ===== FILE STORAGE =====
app.kyc.upload-dir=./uploads/kyc

# ===== CORS =====
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:4201,http://localhost:42357/

# ===== NOTIFICATION SERVICE =====
notification.service.url=http://localhost:8083
notification.service.enabled=true
app.internal-service-key=mkeja-internal-dev-key

# ===== DISABLE REDIS REPOSITORIES =====
spring.data.redis.repositories.enabled=false

# ===== SESSION CONFIGURATION =====
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
